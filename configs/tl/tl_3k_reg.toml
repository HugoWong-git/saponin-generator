run_type = "transfer_learning"
tb_logdir = "tb_TL_saponin_3k_reg"
json_out_config = "transfer_learning_saponin_3k_reg.json"

[parameters]
num_epochs = 2
save_every_n_epochs = 1
batch_size = 16

# Similarity regularization settings
num_refs = 16
sample_batch_size = 128

input_model_file = "../priors/reinvent_pubchem.prior"
smiles_file = "../data/saponin_train_3k.smi"
output_model_file = "../priors/saponin_prior_3k_reg.prior"

[parameters.pairs]
type = "tanimoto"
lower_threshold = 0.4
upper_threshold = 0.8
min_cardinality = 1
max_cardinality = 199