run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_RL_saponin_light_e1"
json_out_config = "rl_saponin_light_epoch1.json"

[parameters]
prior_file = "../../priors/saponin_prior_46k_reg_epoch1.prior"
agent_file = "../../priors/saponin_prior_46k_reg_epoch1.prior"
summary_csv_prefix = "rl_saponin_light_epoch1"
use_checkpoint = false
purge_memories = false
smiles_file = ""
sample_strategy = "multinomial"
distance_threshold = 100
batch_size = 64
randomize_smiles = true
isomeric_smiles = false
temperature = 1.0

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[[stage]]
max_steps = 300
max_score = 0.80
chkpt_file = "../../priors/saponin_light_e1_stage1.chkpt"
termination = "simple"
min_steps = 50

[stage.scoring]
type = "arithmetic_mean"

[[stage.scoring.component]]
[stage.scoring.component.external_process]
[[stage.scoring.component.external_process.endpoint]]
name = "Predicted IC50"
weight = 0.35
params.executable = "python"
params.args = "../../scripts/ic50_scorer.py"
params.property = "predictions"
# Mild IC50 transform: reward 0.1-5 uM
[stage.scoring.component.external_process.endpoint.transform]
type = "reverse_sigmoid"
high = 2.3
low = -1.0
k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MW"
weight = 0.25
transform.type = "double_sigmoid"
transform.low = 500.0
transform.high = 800.0
transform.coef_div = 400.0
transform.coef_si = 80.0
transform.coef_se = 80.0

[[stage.scoring.component]]
[stage.scoring.component.TPSA]
[[stage.scoring.component.TPSA.endpoint]]
name = "TPSA"
weight = 0.20
transform.type = "double_sigmoid"
transform.low = 120.0
transform.high = 220.0
transform.coef_div = 100.0
transform.coef_si = 50.0
transform.coef_se = 50.0

[[stage.scoring.component]]
[stage.scoring.component.NumRings]
[[stage.scoring.component.NumRings.endpoint]]
name = "Rings"
weight = 0.12
transform.type = "double_sigmoid"
transform.low = 4.0
transform.high = 7.0
transform.coef_div = 4.0
transform.coef_si = 1.0
transform.coef_se = 1.0

[[stage.scoring.component]]
[stage.scoring.component.Csp3]
[[stage.scoring.component.Csp3.endpoint]]
name = "Fsp3"
weight = 0.08
transform.type = "sigmoid"
transform.low = 0.0
transform.high = 1.0
transform.k = 0.5