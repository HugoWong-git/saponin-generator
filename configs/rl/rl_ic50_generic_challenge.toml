run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_RL_generic_challenge"
json_out_config = "rl_ic50_generic_challenge.json"

[parameters]
prior_file = "../../priors/reinvent_pubchem.prior"
agent_file = "../../priors/reinvent_pubchem.prior"
summary_csv_prefix = "rl_ic50_generic_challenge"
use_checkpoint = false
purge_memories = false
smiles_file = ""
sample_strategy = "multinomial"
distance_threshold = 100
batch_size = 64
randomize_smiles = true
isomeric_smiles = false
temperature = 1.0

[learning_strategy]
type = "dap"
sigma = 96
rate = 0.0001

# Stage 1: Mild explore phase
[[stage]]
max_steps = 500
max_score = 0.75
chkpt_file = "../../priors/saponin_ic50_generic_challenge_stage1.chkpt"
termination = "simple"
min_steps = 100

[stage.scoring]
type = "arithmetic_mean"

[[stage.scoring.component]]
[stage.scoring.component.external_process]
[[stage.scoring.component.external_process.endpoint]]
name = "Predicted IC50"
weight = 0.70
params.executable = "python"
params.args = "../../scripts/ic50_scorer.py"
params.property = "predictions"
[stage.scoring.component.external_process.endpoint.transform]
type = "reverse_sigmoid"
high = 4.0
low = 0.0
k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MW"
weight = 0.20
transform.type = "double_sigmoid"
transform.low = 300.0
transform.high = 1000.0
transform.coef_div = 500.0
transform.coef_si = 150.0
transform.coef_se = 150.0

[[stage.scoring.component]]
[stage.scoring.component.Csp3]
[[stage.scoring.component.Csp3.endpoint]]
name = "Fsp3"
weight = 0.10
transform.type = "sigmoid"
transform.low = 0.0
transform.high = 1.0
transform.k = 0.5

# Stage 2: Tighter push phase
[[stage]]
max_steps = 1000
max_score = 0.85
chkpt_file = "../../priors/saponin_ic50_generic_challenge.chkpt"
termination = "simple"
min_steps = 200

[stage.scoring]
type = "arithmetic_mean"

[[stage.scoring.component]]
[stage.scoring.component.external_process]
[[stage.scoring.component.external_process.endpoint]]
name = "Predicted IC50"
weight = 0.80
params.executable = "python"
params.args = "../../scripts/ic50_scorer.py"
params.property = "predictions"
[stage.scoring.component.external_process.endpoint.transform]
type = "reverse_sigmoid"
high = 2.5
low = -1.0
k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MW"
weight = 0.15
transform.type = "double_sigmoid"
transform.low = 300.0
transform.high = 1000.0
transform.coef_div = 500.0
transform.coef_si = 150.0
transform.coef_se = 150.0

[[stage.scoring.component]]
[stage.scoring.component.Csp3]
[[stage.scoring.component.Csp3.endpoint]]
name = "Fsp3"
weight = 0.05
transform.type = "sigmoid"
transform.low = 0.0
transform.high = 1.0
transform.k = 0.5