run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_RL_generic_challenge_v2"
json_out_config = "rl_ic50_generic_challenge_v2.json"

[parameters]
prior_file = "../../priors/reinvent_pubchem.prior"
agent_file = "../../priors/reinvent_pubchem.prior"
summary_csv_prefix = "rl_ic50_generic_challenge_v2"
use_checkpoint = false
purge_memories = false
smiles_file = ""
sample_strategy = "multinomial"
distance_threshold = 100
batch_size = 64
randomize_smiles = true
isomeric_smiles = false
temperature = 1.0

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[[stage]]
max_steps = 2000
max_score = 0.85
chkpt_file = "../../priors/saponin_ic50_generic_challenge_v2.chkpt"
termination = "simple"
min_steps = 200

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.external_process]
[[stage.scoring.component.external_process.endpoint]]
name = "Predicted IC50"
weight = 1.0
params.executable = "python"
params.args = "../../scripts/ic50_scorer.py"
params.property = "predictions"
# Same transform that worked in Generic-RL Extended (reached IC50 0.74 uM)
[stage.scoring.component.external_process.endpoint.transform]
type = "reverse_sigmoid"
high = 3.0
low = -1.0
k = 0.5