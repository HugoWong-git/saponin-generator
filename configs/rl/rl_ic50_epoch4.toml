run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_RL_ic50_epoch4_v3"
json_out_config = "rl_saponin_ic50_epoch4_v3.json"

[parameters]
prior_file = "../../priors/saponin_prior_46k_reg_epoch4.prior"
agent_file = "../../priors/saponin_prior_46k_reg_epoch4.prior"
summary_csv_prefix = "rl_saponin_ic50_epoch4_v3"
use_checkpoint = false
purge_memories = false
smiles_file = ""
sample_strategy = "multinomial"
distance_threshold = 100
batch_size = 64
randomize_smiles = true
isomeric_smiles = false
temperature = 1.0

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[[stage]]
max_steps = 500
max_score = 0.85
chkpt_file = "../../priors/saponin_ic50_rl_epoch4_v3.chkpt"
termination = "simple"
min_steps = 50

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.external_process]
[[stage.scoring.component.external_process.endpoint]]
name = "Predicted IC50"
weight = 1.0
params.executable = "python"
params.args = "../../scripts/ic50_scorer.py"
params.property = "predictions"
# Tighter than v1 but still achievable:
#   ln=-1 → IC50 ~0.37 µM → score ~0.95
#   ln= 0 → IC50 ~1 µM   → score ~0.73
#   ln= 1 → IC50 ~2.7 µM → score ~0.50
#   ln= 3 → IC50 ~20 µM  → score ~0.05
[stage.scoring.component.external_process.endpoint.transform]
type = "reverse_sigmoid"
high = 3.0
low = -1.0
k = 0.5