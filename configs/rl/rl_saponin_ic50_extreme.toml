run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_RL_ic50_extreme"
json_out_config = "rl_saponin_ic50_extreme.json"

[parameters]
prior_file = "../../priors/saponin_ic50_rl_epoch4_v3.chkpt"
agent_file = "../../priors/saponin_ic50_rl_epoch4_v3.chkpt"
summary_csv_prefix = "rl_saponin_ic50_extreme"
use_checkpoint = false
purge_memories = false
smiles_file = ""
sample_strategy = "multinomial"
distance_threshold = 100
batch_size = 64
randomize_smiles = true
isomeric_smiles = false
temperature = 1.0

[learning_strategy]
type = "dap"
sigma = 256
rate = 0.0001

[[stage]]
max_steps = 500
max_score = 0.90
chkpt_file = "../../priors/saponin_ic50_extreme.chkpt"
termination = "simple"
min_steps = 50

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.external_process]
[[stage.scoring.component.external_process.endpoint]]
name = "Predicted IC50"
weight = 1.0
params.executable = "python"
params.args = "../../scripts/ic50_scorer.py"
params.property = "predictions"
# Realistic extreme: target ~0.5 uM (model training min ~0.9 uM)
#   ln=-0.69 -> IC50 ~0.5 uM -> score ~0.95
#   ln= 0.0  -> IC50 ~1 uM  -> score ~0.73
#   ln= 0.69 -> IC50 ~2 uM  -> score ~0.50
#   ln= 1.61 -> IC50 ~5 uM  -> score ~0.05
[stage.scoring.component.external_process.endpoint.transform]
type = "reverse_sigmoid"
high = 1.6
low = -0.7
k = 0.5